<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyusunan Formulir</title>
    <style>
        /* CSS UNTUK TAMPILAN */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 650px;
            background: #ffffff;
            padding: 30px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 25px;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }

        fieldset {
            border: 1px solid #ddd;
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 8px;
        }

        legend {
            font-weight: bold;
            color: #0056b3;
            padding: 0 10px;
            font-size: 1.1em;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="tel"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0056b3;
            box-shadow: 0 0 5px rgba(0,86,179,0.2);
        }

        /* Styling khusus untuk Radio Button (Jenis Transaksi) */
        .radio-group {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-item input {
            margin-right: 8px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Penyusunan Formulir</h2>
        <form action="#" method="post">
            
            <fieldset>
                <legend>Data Demografi</legend>
                
                <label for="nama">Nama Pengguna:</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>

                <label for="tgl_lahir">Tanggal Lahir:</label>
                <input type="date" id="tgl_lahir" name="tgl_lahir" required>

                <label for="alamat">Alamat:</label>
                <textarea id="alamat" name="alamat" rows="3" placeholder="Alamat lengkap..." required></textarea>

                <label for="no_telp">No Telepon:</label>
                <input type="tel" id="no_telp" name="no_telp" placeholder="Contoh: 08123456789" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="nama@email.com" required>

                <label for="pendidikan">Tingkatan Pendidikan:</label>
                <select id="pendidikan" name="pendidikan" required>
                    <option value="" disabled selected>Pilih Pendidikan</option>
                    <option value="SD">SD</option>
                    <option value="SMP">SMP</option>
                    <option value="SMA/SMK">SMA/SMK</option>
                    <option value="D3">D3</option>
                    <option value="S1">S1</option>
                    <option value="S2">S2</option>
                    <option value="S3">S3</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Data Bank</legend>

                <label for="nama_bank">Nama Bank:</label>
                <input list="list_bank" id="nama_bank" name="nama_bank" placeholder="Cari/Pilih Bank..." required>
                <datalist id="list_bank">
                    <option value="Bank BCA">
                    <option value="Bank Mandiri">
                    <option value="Bank BNI">
                    <option value="Bank BRI">
                    <option value="Bank BTN">
                    <option value="Bank Syariah Indonesia (BSI)">
                </datalist>

                <label for="no_rekening">Nomor Rekening:</label>
                <input type="number" id="no_rekening" name="no_rekening" placeholder="Masukkan nomor rekening" required>
            </fieldset>

            <fieldset>
                <legend>Data Transaksi Keuangan</legend>

                <label for="tgl_transaksi">Tanggal Transaksi:</label>
                <input type="date" id="tgl_transaksi" name="tgl_transaksi" required>

                <label for="uraian">Uraian Transaksi:</label>
                <input type="text" id="uraian" name="uraian" placeholder="Contoh: Bayar Listrik" required>

                <label>Jenis Transaksi:</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" id="debet" name="jenis_transaksi" value="debet" required> Debet
                    </label>
                    <label class="radio-item">
                        <input type="radio" id="kredit" name="jenis_transaksi" value="kredit"> Kredit
                    </label>
                </div>
            </fieldset>

            <button type="submit">Kirim Formulir</button>
        </form>
    </div>

</body>
</html>
